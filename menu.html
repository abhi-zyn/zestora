<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu – Zestora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/menu.css">
</head>
<body>
  <div class="page-transition"></div>
  <div class="scroll-progress"></div>

  <nav class="nav glass visible">
    <a href="index.html" class="nav-logo">Zestora</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="booking.html">Book</a></li>
    </ul>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="booking.html">Book</a>
  </div>

  <main class="menu-page">
    <div class="menu-header">
      <h1>Our Menu</h1>
      <p>Handcrafted with love, served with a smile</p>
    </div>

    <div class="category-tabs">
      <button class="tab-btn active" data-category="coffee">☕ Coffee</button>
      <button class="tab-btn" data-category="food">🥗 Food</button>
      <button class="tab-btn" data-category="drinks">🥤 Drinks</button>
      <button class="tab-btn" data-category="desserts">🍰 Desserts</button>
    </div>

    <div class="menu-grid"></div>
  </main>

  <button class="cart-toggle">🛒<span class="cart-badge" style="display:none">0</span></button>

  <div class="cart-overlay"></div>
  <div class="cart-panel">
    <div class="cart-header">
      <h2>Your Order</h2>
      <button class="cart-close">✕</button>
    </div>
    <div class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span class="cart-total-price">$0.00</span></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;">Place Order</button>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-grid">
      <div><h3>Zestora</h3><p>Fresh. Bold. Alive.</p></div>
      <div><h3>Hours</h3><ul><li>Mon–Fri: 7am – 9pm</li><li>Sat: 8am – 10pm</li><li>Sun: 8am – 8pm</li></ul></div>
      <div><h3>Contact</h3><ul><li>123 Green Lane</li><li>hello@zestora.cafe</li></ul></div>
    </div>
    <div class="footer-bottom"><p>&copy; 2026 Zestora.</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script>gsap.registerPlugin(ScrollTrigger);</script>
  <script src="js/smooth-scroll.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
