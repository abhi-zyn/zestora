<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Menu – Zestora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/menu-new.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <button class="header-icon-btn menu-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="header-brand">
        <p class="greeting">Welcome to</p>
        <h1>Zest<span class="highlight">ora</span></h1>
      </div>
      <button class="header-icon-btn notif-btn" aria-label="Notifications">
        <span class="notif-dot"></span>🔔
      </button>
    </header>

    <!-- Hero / Title -->
    <div class="hero-title">
      <h2>Choose Your <span class="highlight">Favorite Food</span></h2>
      <p>Fresh • Healthy • Delicious</p>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search" id="searchInput">
      <button class="filter-btn">⚙️</button>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs" id="categoryTabs"></div>

    <!-- Menu Section -->
    <section class="menu-section">
      <div class="section-header">
        <h2>Popular Food</h2>
        <button class="see-all">See All</button>
      </div>
      <div class="menu-grid" id="menuGrid"></div>
    </section>
  </div>

  <!-- Detail Modal -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-modal" id="detailModal">
      <div class="detail-header">
        <button class="detail-back" id="detailBack">‹</button>
        <button class="detail-more">⋮</button>
      </div>
      <div class="detail-image-wrap">
        <div class="detail-plate">
          <img class="detail-image" id="detailImage" src="" alt="">
        </div>
      </div>
      <div class="detail-info">
        <h2 id="detailName"></h2>
        <p id="detailCategory"></p>
        <div class="detail-price">
          <span>Total price</span>
          <span class="price" id="detailPrice"></span>
        </div>
        <button class="add-to-cart-btn">⊕ Add to Cart</button>
      </div>
      <!-- Swipe hint -->
      <div class="swipe-hint">← Swipe to navigate →</div>
    </div>
  </div>

  <script src="js/menu-new.js"></script>
</body>
</html>
